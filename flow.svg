<svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Analysis Engine process flow</title>
  <desc>Flowchart: main_controller connects to Binance, runs an execution profile through execution_engine which places orders and calls analysis_engine on fill, then enters a 30s periodic update loop writing CSV files.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .label-main { font-size: 13px; font-weight: 600; fill: #3b2f8f; }
    .label-sub  { font-size: 11px; font-weight: 400; fill: #6d5fd0; }
    .label-teal-main { font-size: 13px; font-weight: 600; fill: #085041; }
    .label-teal-sub  { font-size: 11px; font-weight: 400; fill: #0f6e56; }
    .label-blue-main { font-size: 13px; font-weight: 600; fill: #042c53; }
    .label-blue-sub  { font-size: 11px; font-weight: 400; fill: #185fa5; }
    .label-amber-main { font-size: 13px; font-weight: 600; fill: #412402; }
    .label-amber-sub  { font-size: 11px; font-weight: 400; fill: #854f0b; }
    .label-gray-main { font-size: 13px; font-weight: 600; fill: #2c2c2a; }
    .label-gray-sub  { font-size: 11px; font-weight: 400; fill: #5f5e5a; }
    .label-side { font-size: 11px; fill: #9ca3af; }
  </style>

  <!-- ── START pill ── -->
  <rect x="270" y="20" width="140" height="34" rx="17" fill="#e5e7eb" stroke="#d1d5db" stroke-width="0.5"/>
  <text class="label-gray-main" x="340" y="42" text-anchor="middle">Start</text>

  <line x1="340" y1="54" x2="340" y2="80" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── main_controller ── -->
  <rect x="180" y="80" width="300" height="54" rx="8" fill="#eeedfe" stroke="#afa9ec" stroke-width="0.5"/>
  <text class="label-main" x="330" y="102" text-anchor="middle">main_controller.py</text>
  <text class="label-sub" x="330" y="120" text-anchor="middle">Connect to Binance Testnet · ping()</text>

  <line x1="340" y1="134" x2="340" y2="160" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Decision diamond (profile valid?) ── -->
  <rect x="200" y="160" width="280" height="50" rx="8" fill="#faeeda" stroke="#f9c875" stroke-width="0.5"/>
  <text class="label-amber-main" x="340" y="180" text-anchor="middle">Execution profile defined?</text>
  <text class="label-amber-sub" x="340" y="198" text-anchor="middle">is_profile_valid(PROFILE_EXECUTION)</text>

  <!-- YES label + arrow down -->
  <text class="label-side" x="356" y="226">Yes</text>
  <line x1="340" y1="210" x2="340" y2="244" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- NO label + dashed path right → down to loop -->
  <text class="label-side" x="484" y="184">No — skip to loop</text>
  <path d="M480 185 L570 185 L570 490" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- ── execution_engine ── -->
  <rect x="150" y="244" width="380" height="54" rx="8" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
  <text class="label-teal-main" x="340" y="266" text-anchor="middle">execution_engine.py</text>
  <text class="label-teal-sub" x="340" y="284" text-anchor="middle">Parse profile · validate qty · place market order</text>

  <line x1="340" y1="298" x2="340" y2="324" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Binance API ── -->
  <rect x="190" y="324" width="300" height="50" rx="8" fill="#e6f1fb" stroke="#85b7eb" stroke-width="0.5"/>
  <text class="label-blue-main" x="340" y="346" text-anchor="middle">Binance Testnet API</text>
  <text class="label-blue-sub" x="340" y="364" text-anchor="middle">create_order() → order FILLED</text>

  <line x1="340" y1="374" x2="340" y2="400" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── on fill: analysis_engine ── -->
  <rect x="140" y="400" width="360" height="54" rx="8" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
  <text class="label-teal-main" x="320" y="422" text-anchor="middle">analysis_engine.update_from_execution()</text>
  <text class="label-teal-sub" x="320" y="440" text-anchor="middle">Append order_history.csv · rebuild FIFO ledger</text>

  <line x1="340" y1="454" x2="340" y2="480" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Periodic loop ── -->
  <rect x="150" y="480" width="380" height="54" rx="8" fill="#eeedfe" stroke="#afa9ec" stroke-width="0.5"/>
  <text class="label-main" x="340" y="502" text-anchor="middle">periodic_update() — every 30s</text>
  <text class="label-sub" x="340" y="520" text-anchor="middle">Live prices · balances · PnL · write CSVs</text>

  <!-- repeat loop back arrow -->
  <path d="M150 507 L80 507 L80 307 L150 307" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text class="label-side" x="62" y="410" text-anchor="middle" transform="rotate(-90 62 410)">repeat</text>

  <line x1="340" y1="534" x2="340" y2="562" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- split to two CSV boxes -->
  <path d="M340 562 L226 562" fill="none" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 562 L454 562" fill="none" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── portfolio_update.csv ── -->
  <rect x="110" y="562" width="232" height="50" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="label-gray-main" x="226" y="582" text-anchor="middle">portfolio_update.csv</text>
  <text class="label-gray-sub" x="226" y="599" text-anchor="middle">positions · PnL · prices</text>

  <!-- ── order_history.csv ── -->
  <rect x="338" y="562" width="232" height="50" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="label-gray-main" x="454" y="582" text-anchor="middle">order_history.csv</text>
  <text class="label-gray-sub" x="454" y="599" text-anchor="middle">all filled orders</text>
</svg>
